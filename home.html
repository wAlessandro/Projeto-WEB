<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home - AutoPeças+</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">

    <div class="container">

        <a class="navbar-brand">
            AutoPeças+
        </a>

        <div class="ms-auto">

            <span class="text-white me-3" id="nomeUsuario"></span>

            <span id="menuVendedor"></span>

            <button
                class="btn btn-danger btn-sm"
                onclick="sair()">

                Sair
            </button>

        </div>

    </div>

</nav>

<div
    id="carouselExample"
    class="carousel slide"
    data-bs-ride="carousel">

    <div class="carousel-inner">

        <div class="carousel-item active">
            <img src="https://picsum.photos/1200/400?1"
                 class="d-block w-100 banner">
        </div>

        <div class="carousel-item">
            <img src="https://picsum.photos/1200/400?2"
                 class="d-block w-100 banner">
        </div>

        <div class="carousel-item">
            <img src="https://picsum.photos/1200/400?3"
                 class="d-block w-100 banner">
        </div>

    </div>

</div>

<div class="container mt-4">

    <h3>Pesquisar Peças</h3>

    <div class="input-group mb-4">

        <input
            type="text"
            id="buscaPeca"
            class="form-control"
            placeholder="Ex: Farol Gol">

        <button
            class="btn btn-primary"
            onclick="pesquisarPecas()">

            Pesquisar
        </button>

    </div>

    <div
        class="row"
        id="resultadoPecas">

    </div>

    <hr>

    <h3>Pesquisar Vendedores</h3>

    <div class="input-group mb-4">

        <input
            type="text"
            id="buscaVendedor"
            class="form-control"
            placeholder="Nome do vendedor">

        <button
            class="btn btn-primary"
            onclick="pesquisarVendedores()">

            Pesquisar
        </button>

    </div>

    <div
        class="row"
        id="resultadoVendedores">

    </div>

</div>

<script src="js/auth.js"></script>
<script src="js/home.js"></script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
